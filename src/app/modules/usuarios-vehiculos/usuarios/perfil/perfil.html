<div class="max-w-6xl mx-auto animate-in">
    <!-- Header Profesional -->
    <div class="flex flex-col md:flex-row justify-between items-end mb-10 gap-6">
      <div>
        <div class="flex items-center gap-2 mb-2">
            <span class="w-8 h-[2px] bg-blue-600"></span>
            <span class="text-[10px] font-black text-blue-600 uppercase tracking-[0.3em]">Configuración Personal</span>
        </div>
        <h1 class="text-4xl font-black text-slate-900 tracking-tighter uppercase italic">Mi <span class="text-blue-600 underline decoration-4 decoration-blue-100 underline-offset-8">Perfil</span></h1>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
        <!-- Tarjeta de Identidad -->
        <div class="lg:col-span-1">
            <div class="bg-white rounded-[2.5rem] p-10 border border-slate-200 shadow-sm text-center">
                <div class="relative inline-block mb-8">
                    <img src="https://ui-avatars.com/api/?name={{user.nombre}}&background=0f172a&color=fff&size=160&bold=true&rounded=true" 
                         class="w-32 h-32 shadow-2xl border-4 border-white mx-auto" alt="Avatar">
                    <div class="absolute -bottom-2 -right-2 bg-blue-600 w-10 h-10 rounded-full border-4 border-white shadow-lg flex items-center justify-center text-white">
                        <i class="bi bi-shield-check text-sm"></i>
                    </div>
                </div>
                
                <h3 class="text-2xl font-black text-slate-900 tracking-tighter uppercase italic mb-1">{{user.nombre}}</h3>
                <span class="px-4 py-1 bg-slate-100 text-slate-500 rounded-full text-[10px] font-black uppercase tracking-widest border border-slate-200">
                    Nivel: {{user.rol.replace('_', ' ')}}
                </span>
                
                <div class="mt-10 space-y-4 text-left">
                    <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 flex items-center gap-4">
                        <i class="bi bi-envelope text-blue-600"></i>
                        <div>
                            <p class="text-[9px] font-black text-slate-400 uppercase">Email</p>
                            <p class="text-xs font-bold text-slate-700">{{user.email}}</p>
                        </div>
                    </div>
                    <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 flex items-center gap-4">
                        <i class="bi bi-calendar-check text-blue-600"></i>
                        <div>
                            <p class="text-[9px] font-black text-slate-400 uppercase">Antigüedad</p>
                            <p class="text-xs font-bold text-slate-700">Miembro SOS 2024</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Formulario de Edición Premium -->
        <div class="lg:col-span-2">
            <div class="bg-white rounded-[2.5rem] p-12 border border-slate-200 shadow-sm">
                <h4 class="text-sm font-black text-slate-900 uppercase tracking-[0.2em] mb-10 pb-4 border-b border-slate-100">
                    <i class="bi bi-sliders2-vertical me-2 text-blue-600"></i> Información de Cuenta
                </h4>
                
                <div class="space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="md:col-span-2">
                          <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Nombre de Usuario</label>
                          <input type="text" [(ngModel)]="user.nombre" 
                                 [disabled]="!authService.hasPermission('usuarios.perfil.modificar')"
                                 class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 text-sm font-bold focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all disabled:opacity-50" placeholder="Tu nombre">
                        </div>
                        
                        <div>
                          <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Correo Principal</label>
                          <input type="email" [(ngModel)]="user.email" 
                                 class="w-full bg-slate-100 border-2 border-slate-200 rounded-2xl p-4 text-sm font-bold text-slate-400 cursor-not-allowed outline-none" disabled>
                          <p class="text-[9px] text-slate-400 mt-2 italic">* El correo no puede ser editado.</p>
                        </div>

                        <div>
                          <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Teléfono / WhatsApp</label>
                          <input type="text" [(ngModel)]="user.telefono" 
                                 [disabled]="!authService.hasPermission('usuarios.perfil.modificar')"
                                 class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 text-sm font-bold focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all disabled:opacity-50" placeholder="+591 7XXXXXXX">
                        </div>
                    </div>

                    <div class="pt-8 border-t border-slate-100">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 block">Actualizar Seguridad</label>
                        <div class="relative">
                            <i class="bi bi-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="password" [(ngModel)]="user.password" 
                                   [disabled]="!authService.hasPermission('usuarios.perfil.modificar')"
                                   class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 pl-12 text-sm font-bold focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all disabled:opacity-50" placeholder="••••••••">
                        </div>
                        <p class="text-[9px] text-slate-400 mt-2 italic">* Dejar vacío si no desea cambiar la contraseña actual.</p>
                    </div>
                </div>

                <div class="mt-12 flex justify-end" *ngIf="authService.hasPermission('usuarios.perfil.modificar')">
                    <button class="px-12 py-5 bg-blue-600 text-white font-black rounded-2xl shadow-xl shadow-blue-500/30 hover:bg-blue-700 transition-all text-xs tracking-widest flex items-center gap-3 disabled:opacity-50" 
                            (click)="guardar()" [disabled]="loading">
                        <i class="bi bi-check2-circle text-lg" *ngIf="!loading"></i>
                        <span *ngIf="!loading">GUARDAR CAMBIOS</span>
                        <span *ngIf="loading" class="spinner-border spinner-border-sm"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
